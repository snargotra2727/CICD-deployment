name: Staging CI/CD

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Staging Environment
        shell: powershell
        run: |
          Write-Host "🧪 Deploying STAGING environment..." -ForegroundColor Yellow
          cd staging
          docker compose down -v
          docker compose up -d --build
          
      - name: Wait for services
        shell: powershell
        run: Start-Sleep -Seconds 30

      - name: Health Check
        shell: powershell
        run: |
          $retries = 24
          for ($i = 0; $i -lt $retries; $i++) {
            try {
              $res = Invoke-WebRequest http://localhost:3001/api/health -TimeoutSec 3
              if ($res.StatusCode -eq 200) {
                Write-Host "✅ Staging backend is healthy" -ForegroundColor Green
                exit 0
              }
            } catch {
              Write-Host "Waiting for staging backend... ($i/$retries)" -ForegroundColor Yellow
            }
            Start-Sleep -Seconds 5
          }
          exit 1

      - name: Show Staging Containers
        shell: powershell
        run: |
          Write-Host "`nStaging Containers:" -ForegroundColor Cyan
          cd staging
          docker compose ps
