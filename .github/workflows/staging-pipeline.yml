name: Staging CI/CD

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  check-runner:
    name: Check Runner
    runs-on: self-hosted
    steps:
      - name: Verify Runner Permissions
        shell: powershell
        run: |
          Write-Host "Checking runner permissions..." -ForegroundColor Yellow
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole] "Administrator")
          if ($isAdmin) {
            Write-Host "✅ Runner is running as Administrator" -ForegroundColor Green
          } else {
            Write-Host "❌ Runner is NOT running as Administrator" -ForegroundColor Red
            exit 1
          }

  build-backend:
    name: Build Backend
    runs-on: self-hosted
    needs: check-runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        shell: powershell
        run: |
          Write-Host "Building backend image..." -ForegroundColor Yellow
          cd staging/backend
          docker build -t staging-backend .

  build-frontend:
    name: Build Frontend
    runs-on: self-hosted
    needs: build-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Image
        shell: powershell
        run: |
          Write-Host "Building frontend image..." -ForegroundColor Yellow
          cd staging/frontend/user-management-ui
          docker build -t staging-frontend .

  deploy:
    name: Deploy Locally
    runs-on: self-hosted
    needs: build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Staging
        shell: powershell
        run: |
          Write-Host "Deploying staging application..." -ForegroundColor Yellow
          cd staging
          docker compose down -v
          docker compose up -d
          Write-Host "✅ Deployment command executed" -ForegroundColor Green

      - name: Wait for services
        shell: powershell
        run: Start-Sleep -Seconds 20

      - name: Verify Staging
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "Checking staging deployment..." -ForegroundColor Yellow
          $services = @(
            @{Name="Backend"; Port=3001; Path="/api/health"},
            @{Name="Frontend"; Port=81; Path="/"}
          )
          
          foreach ($service in $services) {
            try {
              $res = Invoke-WebRequest -Uri "http://localhost:$($service.Port)$($service.Path)" -TimeoutSec 5 -UseBasicParsing
              if ($res.StatusCode -eq 200) {
                Write-Host "  ✅ $($service.Name) is running" -ForegroundColor Green
              } else {
                Write-Host "  ⚠️ $($service.Name) returned $($res.StatusCode)" -ForegroundColor Yellow
              }
            } catch {
              Write-Host "  ⚠️ $($service.Name) not responding yet" -ForegroundColor Yellow
            }
          }

      - name: Show Containers
        shell: powershell
        run: |
          Write-Host "`nStaging Containers:" -ForegroundColor Cyan
          docker ps --filter "name=staging" --format "table {{.Names}}\t{{.Status}}"

      - name: Deployment Complete
        shell: powershell
        run: |
          Write-Host "`n" + "="*50 -ForegroundColor Yellow
          Write-Host "✅ STAGING DEPLOYMENT SUCCESSFUL!" -ForegroundColor Yellow
          Write-Host "="*50 -ForegroundColor Yellow
          Write-Host "Frontend: http://localhost:81" -ForegroundColor Cyan
          Write-Host "Backend API: http://localhost:3001/api" -ForegroundColor Cyan
          Write-Host "="*50 -ForegroundColor Yellow
