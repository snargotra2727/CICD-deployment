services:
  mysql-prod:
    image: mysql:8.0
    container_name: mysql-prod
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: user_management_prod
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - prod-network

  backend-prod:
    build: ./backend
    container_name: backend-prod
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql-prod
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: user_management_prod
      NODE_ENV: production
    depends_on:
      mysql-prod:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prod-network

  frontend-prod:
    build: ./frontend/user-management-ui
    container_name: frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend-prod
    restart: unless-stopped
    networks:
      - prod-network

volumes:
  mysql_data_prod:

networks:
  prod-network:
    driver: bridge
